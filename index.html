<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WOA Titan Dashboard</title>
  <style>
    :root {
      --bg: #030712;
      --glass: rgba(17, 24, 39, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.5);
      --text-main: #f3f4f6;
      --text-dim: #9ca3af;
      --good: #10b981;
      --bad: #ef4444;
      --warn: #f59e0b;
      --radius: 20px;
    }

    * { box-sizing: border-box; scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background: radial-gradient(circle at top right, #111827, var(--bg));
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Entry Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate { animation: fadeInUp 0.6s ease forwards; }

    /* Layout Shell */
    .dashboard-container {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px;
      width: 100%;
    }

    /* Sidebar - Sticky KPI & Nav */
    .sidebar {
      position: sticky;
      top: 24px;
      height: fit-content;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease, border-color 0.3s ease;
    }

    .glass-card:hover {
      border-color: rgba(59, 130, 246, 0.3);
    }

    /* Typography */
    h1 { font-size: 24px; margin: 0; letter-spacing: -0.5px; }
    .kpi-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .kpi-value { font-size: 28px; font-weight: 800; color: var(--text-main); }
    .kpi-sub { font-size: 13px; margin-top: 4px; }

    /* Main Content */
    .main-content { display: flex; flex-direction: column; gap: 24px; }

    .grid-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
    }

    /* Form Elements */
    .control-group { margin-top: 15px; }
    select, input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      padding: 12px;
      border-radius: 12px;
      color: white;
      margin-top: 5px;
      outline: none;
    }

    .btn-nav {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 15px;
    }

    button {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button.secondary { background: rgba(255,255,255,0.1); }
    button:hover { opacity: 0.8; }

    /* Tables */
    .table-container { overflow-x: auto; margin-top: 15px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px; font-size: 12px; color: var(--text-dim); border-bottom: 1px solid var(--glass-border); }
    td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 14px; }

    .num { font-family: 'Monaco', monospace; text-align: right; }
    .tag-new { background: var(--good); color: #000; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }

    /* Custom KPI for <100M */
    .kpi-special { border-left: 4px solid var(--warn); }

    /* Responsive */
    @media (max-width: 1024px) {
      .dashboard-container { grid-template-columns: 1fr; }
      .sidebar { position: relative; top: 0; }
    }
  </style>
</head>
<body>

<div class="dashboard-container">
  <aside class="sidebar animate" style="animation-delay: 0.1s;">
    <div class="glass-card">
      <div class="kpi-label">Clan Commander</div>
      <h1>WOA TITAN</h1>
      <div class="kpi-sub" id="statusMsg" style="color:var(--accent)">System Online</div>
    </div>

    <div class="glass-card">
      <div class="kpi-label">Global Navigation</div>
      <div class="control-group">
        <label>Selected Epoch (Week)</label>
        <select id="weekSelect"></select>
      </div>
      <div class="control-group">
        <label>Player Intel Search</label>
        <input type="text" id="playerSearch" placeholder="Enter name...">
      </div>
      <div class="btn-nav">
        <button class="secondary" id="prevWeekBtn">Prev</button>
        <button class="secondary" id="nextWeekBtn">Next</button>
      </div>
    </div>

    <div class="glass-card">
      <div class="kpi-label">Total Might</div>
      <div class="kpi-value" id="kpiTotalMight">—</div>
    </div>

    <div class="glass-card kpi-special">
      <div class="kpi-label">Under 100M Might</div>
      <div class="kpi-value" id="kpiUnder100M" style="color: var(--warn);">—</div>
      <div class="kpi-sub">Players needing growth</div>
    </div>

    <div class="glass-card">
      <div class="kpi-label">Active Roster</div>
      <div class="kpi-value" id="kpiActivePlayers">—</div>
    </div>
  </aside>

  <main class="main-content">
    <div class="grid-stats">
      <div class="glass-card animate" style="animation-delay: 0.2s;">
        <div class="kpi-label">Avg Might</div>
        <div class="kpi-value" id="kpiAvgMight" style="font-size: 20px;">—</div>
      </div>
      <div class="glass-card animate" style="animation-delay: 0.3s;">
        <div class="kpi-label">Net Gain</div>
        <div class="kpi-value" id="kpiGrowth" style="font-size: 20px;">—</div>
        <div class="kpi-sub" id="kpiGrowthPct">0%</div>
      </div>
      <div class="glass-card animate" style="animation-delay: 0.4s;">
        <div class="kpi-label">Joined/Left</div>
        <div class="kpi-value" id="kpiRosterDelta" style="font-size: 20px;">—</div>
      </div>
    </div>

    <div class="glass-card animate" style="animation-delay: 0.5s;">
      <div class="kpi-label">Clan Growth Progression</div>
      <div id="lineChart" style="height: 300px; margin-top: 20px;"></div>
    </div>

    <div class="glass-card animate" style="animation-delay: 0.6s;">
      <div class="kpi-label">Roster Intel Analysis</div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>PLAYER</th>
              <th class="num">MIGHT</th>
              <th class="num">CHANGE</th>
              <th class="num">%</th>
            </tr>
          </thead>
          <tbody id="playerBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script>
  // Configuration
 const WEEKLY_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSGRZ5WTeYts84FCArLvGa5iaZWimBaxq_MuRAfwmXp0-iKVV5X6JwacmvTSnM6sg/pub?gid=1957525861&single=true&output=csv";
  const PLAYER_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSGRZ5WTeYts84FCArLvGa5iaZWimBaxq_MuRAfwmXp0-iKVV5X6JwacmvTSnM6sg/pub?gid=474461150&single=true&output=csv";
  const RAW_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSGRZ5WTeYts84FCArLvGa5iaZWimBaxq_MuRAfwmXp0-iKVV5X6JwacmvTSnM6sg/pub?gid=176254662&single=true&output=csv";
  let RAW = [];
  let WEEK_ORDER = [];

  // Formatting
  const fmtCompact = n => new Intl.NumberFormat("en-US", { notation: "compact", maximumFractionDigits: 1 }).format(n);
  const fmtInt = n => new Intl.NumberFormat("en-US").format(Math.floor(n));
  
  function cleanNumber(v) {
    return Number(String(v).replace(/[%,$\s]/g, "").replace(/,/g, "")) || 0;
  }

  async function loadData() {
    try {
      const res = await fetch(RAW_URL + "&t=" + Date.now());
      const text = await res.text();
      const rows = text.split('\n').map(r => r.split(','));
      const headers = rows[0].map(h => h.trim());
      
      RAW = rows.slice(1).map(r => {
        let obj = {};
        headers.forEach((h, i) => obj[h] = r[i]?.trim());
        return {
          Week: obj.Week,
          Player: obj.Player,
          Might: cleanNumber(obj.Might)
        };
      }).filter(r => r.Week && r.Player);

      WEEK_ORDER = [...new Set(RAW.map(r => r.Week))].sort();
      initUI();
    } catch (e) {
      document.getElementById('statusMsg').textContent = "Connection Failed";
    }
  }

  function initUI() {
    const select = document.getElementById('weekSelect');
    select.innerHTML = WEEK_ORDER.map(w => `<option value="${w}">${w}</option>`).join('');
    select.value = WEEK_ORDER[WEEK_ORDER.length - 1];

    select.addEventListener('change', refresh);
    document.getElementById('playerSearch').addEventListener('input', refresh);
    document.getElementById('prevWeekBtn').onclick = () => { select.selectedIndex--; refresh(); };
    document.getElementById('nextWeekBtn').onclick = () => { select.selectedIndex++; refresh(); };

    refresh();
  }

  function refresh() {
    const week = document.getElementById('weekSelect').value;
    const search = document.getElementById('playerSearch').value.toLowerCase();
    const currentData = RAW.filter(r => r.Week === week);
    
    // New KPI Logic: Under 100 Million
    const under100M = currentData.filter(r => r.Might < 100000000);
    document.getElementById('kpiUnder100M').textContent = under100M.length;

    // Standard KPIs
    const totalMight = currentData.reduce((s, r) => s + r.Might, 0);
    document.getElementById('kpiTotalMight').textContent = fmtCompact(totalMight);
    document.getElementById('kpiActivePlayers').textContent = currentData.length;
    document.getElementById('kpiAvgMight').textContent = fmtCompact(totalMight / currentData.length);

    // Table
    const tbody = document.getElementById('playerBody');
    tbody.innerHTML = currentData
      .filter(r => r.Player.toLowerCase().includes(search))
      .sort((a,b) => b.Might - a.Might)
      .map(r => `
        <tr>
          <td>${r.Player} ${r.Might < 100000000 ? '<span class="tag-new" style="background:#f59e0b">Low Might</span>' : ''}</td>
          <td class="num">${fmtCompact(r.Might)}</td>
          <td class="num">—</td>
          <td class="num">—</td>
        </tr>
      `).join('');

      renderMiniChart();
  }

  function renderMiniChart() {
    const chartDiv = document.getElementById('lineChart');
    // Simple SVG implementation for the trend
    const weeks = WEEK_ORDER;
    const totals = weeks.map(w => RAW.filter(r => r.Week === w).reduce((s, r) => s + r.Might, 0));
    const max = Math.max(...totals);
    const min = Math.min(...totals);
    
    const points = totals.map((v, i) => {
      const x = (i / (weeks.length - 1)) * 100;
      const y = 100 - ((v - min) / (max - min)) * 80;
      return `${x},${y}`;
    }).join(' ');

    chartDiv.innerHTML = `
      <svg viewBox="0 0 100 100" preserveAspectRatio="none" style="width:100%; height:100%; overflow:visible">
        <polyline points="${points}" fill="none" stroke="var(--accent)" stroke-width="2" />
        <path d="M0,100 L${points} L100,100 Z" fill="url(#grad)" opacity="0.2" />
        <defs>
          <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--accent)" />
            <stop offset="100%" stop-color="transparent" />
          </linearGradient>
        </defs>
      </svg>
    `;
  }

  loadData();
</script>

</body>
</html>
