<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WOA Titan Dashboard</title>
  <style>
    :root {
      --bg: #030712;
      --glass: rgba(17, 24, 39, 0.75);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.4);
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
      --good: #10b981;
      --warn: #f59e0b;
      --bad: #ef4444;
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(circle at 0% 0%, #111827 0%, var(--bg) 100%);
      color: var(--text-main);
      min-height: 100vh;
    }

    /* Animations */
    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 24px;
      padding: 24px;
      max-width: 1800px;
      margin: 0 auto;
    }

    /* Sidebar - Sticky KPIs */
    .sidebar {
      position: sticky;
      top: 24px;
      height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      animation: fadeInScale 0.5s ease-out forwards;
    }

    .kpi-label { font-size: 11px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 8px; }
    .kpi-value { font-size: 34px; font-weight: 900; letter-spacing: -1px; }
    .kpi-sub { font-size: 13px; margin-top: 6px; display: block; }

    /* Controls */
    select, input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 12px;
      color: white;
      margin-top: 8px;
      outline: none;
    }
    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: #60a5fa; box-shadow: 0 0 15px var(--accent-glow); }
    button.secondary { background: rgba(255,255,255,0.1); }

    /* Main Content */
    .main-view { display: flex; flex-direction: column; gap: 24px; }
    
    .stats-header { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }

    /* Table Design */
    .scroll-area { 
      max-height: 550px; 
      overflow-y: auto; 
      margin-top: 12px;
      padding-right: 8px;
    }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px; font-size: 12px; color: var(--text-dim); border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; background: #0f172a; }
    td { padding: 16px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 14px; }

    .might-tag { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 800; }
    .tag-low { background: rgba(245, 158, 11, 0.15); color: var(--warn); }
    .tag-high { background: rgba(16, 185, 129, 0.15); color: var(--good); }

    @media (max-width: 1024px) {
      .dashboard-grid { grid-template-columns: 1fr; }
      .sidebar { position: relative; height: auto; }
    }
  </style>
</head>
<body>

<div class="dashboard-grid">
  <aside class="sidebar">
    <div class="glass-card">
      <div class="kpi-label">System Control</div>
      <h2 style="margin:0; font-weight:900;">TITAN COMMAND</h2>
      <div id="syncStatus" style="font-size:12px; color:var(--accent); margin-top:10px;">Syncing Sources...</div>
    </div>

    <div class="glass-card">
      <div class="kpi-label">Temporal Navigation</div>
      <select id="weekSelect"></select>
      <input type="text" id="playerSearch" placeholder="Search Commander...">
      <div class="btn-row">
        <button class="secondary" id="prevBtn">← Previous</button>
        <button class="secondary" id="nextBtn">Next →</button>
      </div>
    </div>

    <div class="glass-card">
      <div class="kpi-label">Total Clan Might</div>
      <div class="kpi-value" id="kpiTotal">—</div>
      <span class="kpi-sub" id="kpiGrowthLabel">Syncing trend...</span>
    </div>

    <div class="glass-card" style="border-left: 4px solid var(--warn);">
      <div class="kpi-label">Low Might Personnel</div>
      <div class="kpi-value" id="kpiLowMight" style="color: var(--warn);">—</div>
      <span class="kpi-sub">Total under 100,000,000</span>
    </div>

    <div class="glass-card">
      <div class="kpi-label">Combat Readiness</div>
      <div class="kpi-value" id="kpiActive">—</div>
      <span class="kpi-sub">Total Active Players</span>
    </div>
  </aside>

  <main class="main-view">
    <div class="stats-header">
      <div class="glass-card">
        <div class="kpi-label">Avg Might</div>
        <div id="kpiAvg" style="font-size: 20px; font-weight: bold; margin-top:8px;">—</div>
      </div>
      <div class="glass-card">
        <div class="kpi-label">Top Growers</div>
        <div id="topGrower" style="font-size: 18px; font-weight: bold; margin-top:8px; color:var(--good);">Loading...</div>
      </div>
    </div>

    <div class="glass-card">
      <div class="kpi-label">Roster Intelligence</div>
      <div class="scroll-area">
        <table>
          <thead>
            <tr>
              <th>COMMANDER</th>
              <th>MIGHT RATING</th>
              <th>STATUS</th>
            </tr>
          </thead>
          <tbody id="playerTable"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script>
  // All three sources integrated
  const WEEKLY_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSGRZ5WTeYts84FCArLvGa5iaZWimBaxq_MuRAfwmXp0-iKVV5X6JwacmvTSnM6sg/pub?gid=1957525861&single=true&output=csv";
  const PLAYER_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSGRZ5WTeYts84FCArLvGa5iaZWimBaxq_MuRAfwmXp0-iKVV5X6JwacmvTSnM6sg/pub?gid=474461150&single=true&output=csv";
  const RAW_URL    = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSGRZ5WTeYts84FCArLvGa5iaZWimBaxq_MuRAfwmXp0-iKVV5X6JwacmvTSnM6sg/pub?gid=176254662&single=true&output=csv";

  let DATA_WEEKLY = [];
  let DATA_PLAYER = [];
  let DATA_RAW    = [];
  let WEEKS       = [];

  const fmt = n => new Intl.NumberFormat("en-US", { notation: "compact", maximumFractionDigits: 1 }).format(n);

  async function loadAllData() {
    const status = document.getElementById('syncStatus');
    try {
      // Parallel fetching for performance
      const [resW, resP, resR] = await Promise.all([
        fetch(WEEKLY_URL + "&t=" + Date.now()),
        fetch(PLAYER_URL + "&t=" + Date.now()),
        fetch(RAW_URL + "&t=" + Date.now())
      ]);

      const [textW, textP, textR] = await Promise.all([resW.text(), resP.text(), resR.text()]);

      // Parse and Normalize
      DATA_WEEKLY = parseCSV(textW); // Historical Growth
      DATA_PLAYER = parseCSV(textP); // Top Grower rankings
      DATA_RAW    = parseCSV(textR); // Raw Roster

      WEEKS = [...new Set(DATA_RAW.map(d => d.Week))].sort();
      
      const select = document.getElementById('weekSelect');
      select.innerHTML = WEEKS.map(w => `<option value="${w}">${w}</option>`).join('');
      select.value = WEEKS[WEEKS.length - 1];

      status.textContent = "Titan Core Online";
      status.style.color = "var(--good)";

      initApp();
    } catch (err) {
      status.textContent = "Data Link Severed";
      status.style.color = "var(--bad)";
    }
  }

  function parseCSV(text) {
    const rows = text.split('\n').filter(r => r.trim() !== "");
    const headers = rows[0].split(',').map(h => h.trim().replace(/^\uFEFF/, ""));
    return rows.slice(1).map(row => {
      const cols = row.split(',');
      let obj = {};
      headers.forEach((h, i) => {
        let val = cols[i]?.trim();
        obj[h] = isNaN(parseFloat(val?.replace(/[^0-9.]/g, ''))) ? val : parseFloat(val.replace(/[^0-9.]/g, ''));
      });
      return obj;
    });
  }

  function initApp() {
    document.getElementById('weekSelect').onchange = updateView;
    document.getElementById('playerSearch').oninput = updateView;
    document.getElementById('prevBtn').onclick = () => { const s = document.getElementById('weekSelect'); if (s.selectedIndex > 0) { s.selectedIndex--; updateView(); } };
    document.getElementById('nextBtn').onclick = () => { const s = document.getElementById('weekSelect'); if (s.selectedIndex < s.options.length - 1) { s.selectedIndex++; updateView(); } };
    updateView();
  }

  function updateView() {
    const week = document.getElementById('weekSelect').value;
    const search = document.getElementById('playerSearch').value.toLowerCase();
    
    // Roster Filtering
    const roster = DATA_RAW.filter(d => d.Week === week);
    const filtered = roster.filter(d => d.Player.toLowerCase().includes(search));

    // KPI logic
    const total = roster.reduce((s, p) => s + (p.Might || 0), 0);
    const lowMight = roster.filter(p => p.Might < 100000000); // Your 100M threshold
    const weeklySummary = DATA_WEEKLY.find(w => w.Week === week) || {};

    document.getElementById('kpiTotal').textContent = fmt(total);
    document.getElementById('kpiLowMight').textContent = lowMight.length;
    document.getElementById('kpiActive').textContent = roster.length;
    document.getElementById('kpiAvg').textContent = fmt(total / (roster.length || 1));
    
    document.getElementById('kpiGrowthLabel').textContent = `Growth: ${weeklySummary["Growth %"] || 0}%`;
    document.getElementById('kpiGrowthLabel').style.color = (weeklySummary["Growth %"] >= 0) ? "var(--good)" : "var(--bad)";

    // Top Grower from Player Source
    const top = DATA_PLAYER.sort((a,b) => (b["Growth %"] || 0) - (a["Growth %"] || 0))[0];
    document.getElementById('topGrower').textContent = top ? `${top.Player} (${top["Growth %"]}%)` : "—";

    // Table Rendering
    const tbody = document.getElementById('playerTable');
    tbody.innerHTML = filtered.sort((a,b) => b.Might - a.Might).map(p => `
      <tr>
        <td style="font-weight:700">${p.Player}</td>
        <td style="font-family:monospace; color:#cbd5e1">${fmt(p.Might)}</td>
        <td>
          <span class="might-tag ${p.Might < 100000000 ? 'tag-low' : 'tag-high'}">
            ${p.Might < 100000000 ? 'RECRUIT' : 'ELITE'}
          </span>
        </td>
      </tr>
    `).join('');
  }

  loadAllData();
</script>

</body>
</html>
